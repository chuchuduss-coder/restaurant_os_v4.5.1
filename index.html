<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>Restaurant Manager v3</title>

<link rel="stylesheet" href="style.css">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

</head>

<body>

<!-- LOADING -->
<div id="loadingOverlay" style="
position:fixed;top:0;left:0;width:100%;height:100%;
background:rgba(0,0,0,0.5);
display:none;align-items:center;justify-content:center;
z-index:9999;color:#fff;font-size:20px;">
⏳ กำลังโหลดข้อมูล...
</div>

<!-- SYNC STATUS -->
<div id="syncStatus" style="
position:fixed;bottom:10px;right:10px;
background:#333;color:#fff;padding:6px 12px;
border-radius:8px;font-size:12px;z-index:9999;">
☁️ Ready
</div>

<!-- LOGIN -->
<div id="loginPage">

<h2>Restaurant Manager</h2>

<input id="username" placeholder="Username">
<input id="password" type="password" placeholder="Password">

<button onclick="login()">Login</button>

</div>

<!-- APP -->
<div id="app" style="display:none;">

<div id="layout">

<div id="sidebar">
<h3>Restaurant OS</h3>

<button onclick="showPage('dashboard')">Dashboard</button>
<button onclick="showPage('pos')">POS</button>
<button onclick="showPage('expense')">Expense</button>
<button onclick="showPage('stock')">Stock</button>
<button onclick="showPage('analytics')">Analytics</button>
<button onclick="showPage('kpi')">KPI</button>
<button onclick="showPage('attendance')">Check-in</button>
<button onclick="logout()">Logout</button>
</div>

<div id="content">
<div id="page_dashboard" class="page"></div>
<div id="page_pos" class="page"></div>
<div id="page_expense" class="page"></div>
<div id="page_stock" class="page"></div>
<div id="page_analytics" class="page"></div>
<div id="page_kpi" class="page"></div>
<div id="page_attendance" class="page"></div>
</div>

</div>
</div>

<!-- SCRIPTS -->
<script src="database.js"></script>
<script src="sync.js"></script>
<script src="auth.js"></script>
<script src="app.js"></script>
<script src="pos.js"></script>
<script src="expense.js"></script>
<script src="stock.js"></script>
<script src="attendance.js"></script>
<script src="dashboard.js"></script>
<script src="kpi.js"></script>

<!-- 🔥 INIT -->
<script>
window.onload = () => {

let role = localStorage.getItem("role")

if(role){
initAfterLogin()
}else{
document.getElementById("loginPage").style.display = "block"
document.getElementById("app").style.display = "none"
}

}
</script>

</body>
</html>
